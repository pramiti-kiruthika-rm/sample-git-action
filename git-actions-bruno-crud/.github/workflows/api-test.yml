name: Bruno API Tests

on:
  push:
    branches: [ main ]

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Tests
        run: bru run \.collections --env ci --reporter-html results.html

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: bruno-report
          path: results.html